{% extends "base.html" %}

{% block title %}Dashboard – Research Summarizer{% endblock %}

{% block content %}

<div class="dashboard-header">
    <h1 class="page-title"><span class="wave">👋</span> Hey, {{ current_user.username }}!</h1>
    <a href="{{ url_for('auth.logout') }}" class="btn btn-logout">Logout</a>
</div>

<!-- Search Form -->
<form id="search-form" class="form">
    <label for="query" class="form-group" style="margin-bottom:14px;display:block">
        <span style="font-size:0.8rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em">Search Research Topic</span>
    </label>
    <div class="search-wrapper">
        <div class="form-group">
            <input type="text" id="query" name="query" placeholder="e.g., transformer architecture, quantum computing..." required>
        </div>
        <button type="submit" class="btn btn-primary">🔍 Search</button>
    </div>
</form>

<!-- Loading Indicator -->
<div id="loading" style="display:none; margin-bottom:20px;">
    Searching papers...
</div>

<!-- Results Section -->
<div id="results"></div>

{% endblock %}
