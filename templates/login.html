{% extends "base.html" %}

{% block title %}Login – Research Summarizer{% endblock %}

{% block content %}
<div class="auth-hero">
    <div class="hero-icon">🔬</div>
    <h1 class="page-title">Welcome Back</h1>
    <p class="hero-subtitle">Log in to explore and summarize the latest research papers.</p>
</div>

<form class="form" method="post" action="{{ url_for('auth.login') }}">
    <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter your username" required autofocus>
    </div>
    <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required>
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%">Log in</button>
</form>

<p class="form-footer">New here? <a href="{{ url_for('auth.register') }}">Create an account</a></p>
{% endblock %}
